<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <main>
        <section class="inputs">
            <h1 class="respostas" id="titulo">Saiba seu IMC!</h1> <!--Não é intput, mas isso é detalhe-->
            <label for="nome" id="seunome">Seu Nome:</label>
            <input type="text" class="fonte" name="a" id="txtnome" placeholder="Ana Carvalho..." value="">
            
            <label for="peso" id="peso">Peso:</label>
            <input type="number" class="fonte" name="b" id="txtaltura" placeholder="80" value="">
            
            <label for="altura" id="altura">Altura:</label>
            <input type="number" class="fonte" name="c" id="txtpeso" placeholder="1.90" value="">
            
            <input type="button" class="fonte" name="envia" id="btnAlerta" value="Calcular agora">
        </section>

        <section class="outputs">
            <h2 class="respostas" id="nome"></h2>
            <h2 class="respostas" id="imc"></h2>
            <h2 class="respostas" id="status"></h2>
        </section>
    </main>
    <script src="./scripts.js"></script>
</body>
</html>
